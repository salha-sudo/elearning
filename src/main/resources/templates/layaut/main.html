<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title layout:title-pattern="$CONTENT_TITLE - E-Learning FST">
        E-Learning FST
    </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .card-cours { transition: transform .2s; }
        .card-cours:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,.12); }
        .badge-niveau-DEBUTANT { background-color: #28a745 !important; }
        .badge-niveau-INTERMEDIAIRE { background-color: #fd7e14 !important; }
        .badge-niveau-AVANCE { background-color: #dc3545 !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-mortarboard-fill text-primary"></i> E-Learning FST
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalogue}">
                        <i class="bi bi-grid"></i> Catalogue
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}">Connexion</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-primary ms-2" th:href="@{/register}">
                        S'inscrire
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('FORMATEUR')">
                    <a class="nav-link" th:href="@{/formateur/dashboard}">
                        <i class="bi bi-person-video3"></i> Mon espace
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('APPRENANT')">
                    <a class="nav-link" th:href="@{/apprenant/dashboard}">
                        <i class="bi bi-book"></i> Mon espace
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="btn btn-outline-light btn-sm ms-2"
                                type="submit">
                            <i class="bi bi-box-arrow-right"></i> Déconnexion
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div layout:fragment="content"></div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>© 2025 E-Learning FST — Master STR</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
