<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Créer Quiz</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-rose">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i>
            E-Learning FST
        </a>
        <a href="/formateur/dashboard"
           class="btn btn-navbar">
            Mes cours
        </a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-card card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="bi bi-patch-question"></i>
                        Créer un Quiz
                    </h4>
                    <small th:text="'Module : '
                           + ${module.titre}">
                    </small>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/formateur/modules/{id}/quiz/nouveau(id=${module.id})}"
                          method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Titre du Quiz *
                            </label>
                            <input type="text" name="titre"
                                   class="form-control form-control-lg"
                                   placeholder="Ex: Quiz Module 1"
                                   required/>
                        </div>
                        <button type="submit"
                                class="btn btn-rose w-100 btn-lg">
                            <i class="bi bi-plus-circle"></i>
                            Créer et ajouter les questions
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer-rose">
    <div class="container">
        <small>© 2025 E-Learning FST — Master STR</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
