<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Formulaire Cours</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-rose">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i> E-Learning FST
        </a>
        <a href="/formateur/dashboard" class="btn btn-navbar">
            <i class="bi bi-arrow-left"></i> Mes cours
        </a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="form-card card">
                <div class="card-header">
                    <h4 class="mb-0"
                        th:text="${cours.id == null ?
                        'Nouveau cours' : 'Modifier le cours'}">
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="${cours.id == null ?
                                      '/formateur/cours/nouveau' :
                                      '/formateur/cours/'
                                      + cours.id + '/modifier'}"
                          method="post"
                          enctype="multipart/form-data"
                          th:object="${cours}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-card-text"
                                   style="color:#e91e8c;"></i>
                                Titre *
                            </label>
                            <input type="text"
                                   th:field="*{titre}"
                                   class="form-control form-control-lg"
                                   placeholder="Titre du cours"
                                   required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-text-paragraph"
                                   style="color:#e91e8c;"></i>
                                Description *
                            </label>
                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Décrivez votre cours..."
                                      required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-folder"
                                       style="color:#e91e8c;"></i>
                                    Catégorie
                                </label>
                                <select th:field="*{categorie}"
                                        class="form-select">
                                    <option value="">-- Choisir --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat}"
                                            th:text="${cat}"></option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-bar-chart"
                                       style="color:#e91e8c;"></i>
                                    Niveau
                                </label>
                                <select th:field="*{niveau}"
                                        class="form-select">
                                    <option value="">-- Choisir --</option>
                                    <option th:each="niv : ${niveaux}"
                                            th:value="${niv}"
                                            th:text="${niv}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-image"
                                   style="color:#e91e8c;"></i>
                                Image de couverture
                            </label>
                            <input type="file" name="image"
                                   class="form-control"
                                   accept="image/*"/>
                            <div th:if="${cours.imageUrl != null}"
                                 class="mt-2">
                                <img th:src="${cours.imageUrl}"
                                     style="height:120px;
                                            object-fit:cover;
                                            border-radius:10px;"
                                     alt=""/>
                            </div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox"
                                   th:field="*{actif}"
                                   class="form-check-input"/>
                            <label class="form-check-label">
                                Cours actif (visible dans le catalogue)
                            </label>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit"
                                    class="btn btn-rose btn-lg">
                                <i class="bi bi-save"></i>
                                Enregistrer
                            </button>
                            <a href="/formateur/dashboard"
                               class="btn btn-rose-outline btn-lg">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer-rose">
    <div class="container">
        <small>© 2025 E-Learning FST — Master STR</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
