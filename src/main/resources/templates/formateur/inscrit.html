<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Inscrits — <span th:text="${cours.titre}"></span></title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-rose">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i> E-Learning FST
        </a>
        <a href="/formateur/dashboard" class="btn btn-navbar">
            <i class="bi bi-arrow-left"></i> Dashboard
        </a>
    </div>
</nav>

<div class="container mt-4 mb-5">

    <!-- Titre -->
    <h3 class="fw-bold mb-1">
        <i class="bi bi-people" style="color:#e91e8c;"></i>
        Apprenants inscrits
    </h3>
    <p class="text-muted mb-4" th:text="${cours.titre}"></p>

    <!-- Statistiques -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card text-center"
                 style="border:none; border-radius:15px;
                        background:linear-gradient(135deg,#fce4ec,#fdf6f9);
                        padding:20px;">
                <div style="font-size:2.5rem; font-weight:700; color:#e91e8c;"
                     th:text="${nbInscrits}"></div>
                <div class="text-muted">Total inscrits</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center"
                 style="border:none; border-radius:15px;
                        background:linear-gradient(135deg,#e8f5e9,#f1f8e9);
                        padding:20px;">
                <div style="font-size:2.5rem; font-weight:700; color:#28a745;"
                     th:text="${nbTermines}"></div>
                <div class="text-muted">Cours terminés</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center"
                 style="border:none; border-radius:15px;
                        background:linear-gradient(135deg,#e3f2fd,#f3e5f5);
                        padding:20px;">
                <div style="font-size:2.5rem; font-weight:700; color:#1976d2;">
                    <span th:text="${tauxCompletion}"></span>%
                </div>
                <div class="text-muted">Taux de complétion</div>
            </div>
        </div>
    </div>

    <!-- Liste inscrits -->
    <div class="card" style="border:none; border-radius:15px;
                              box-shadow:0 2px 15px rgba(0,0,0,0.08);">
        <div class="card-body p-0">

            <div th:if="${inscrits.empty}" class="text-center py-5">
                <i class="bi bi-people" style="font-size:3rem; color:#f48fb1;"></i>
                <h5 class="mt-3 text-muted">Aucun apprenant inscrit</h5>
            </div>

            <table class="table mb-0" th:if="${!inscrits.empty}">
                <thead style="background:#fce4ec;">
                    <tr>
                        <th class="ps-4">Apprenant</th>
                        <th>Email</th>
                        <th>Date inscription</th>
                        <th>Statut</th>
                        <th>Progression</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ins : ${inscrits}">
                        <td class="ps-4">
                            <i class="bi bi-person-circle me-2"
                               style="color:#e91e8c;"></i>
                            <span th:text="${ins.apprenant.prenom
                                  + ' ' + ins.apprenant.nom}"></span>
                        </td>
                        <td th:text="${ins.apprenant.email}"></td>
                        <td th:text="${ins.dateInscription}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${ins.statut.name() == 'TERMINE'} ?
                                  'bg-success' : (${ins.statut.name() == 'ABANDONNE'} ?
                                  'bg-danger' : 'bg-warning text-dark')"
                                  th:text="${ins.statut}">
                            </span>
                        </td>
                        <td style="min-width:150px;">
                            <div class="d-flex align-items-center gap-2">
                                <div class="progress flex-grow-1"
                                     style="height:8px; border-radius:10px;">
                                    <div class="progress-bar"
                                         style="background:linear-gradient(
                                                135deg,#e91e8c,#c2185b);
                                                border-radius:10px;"
                                         th:style="'width:' +
                                         ${progressions[ins.apprenant.id]} + '%'">
                                    </div>
                                </div>
                                <small style="color:#e91e8c; font-weight:600;">
                                    <span th:text="${progressions[ins.apprenant.id]}"></span>%
                                </small>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="footer-rose">
    <div class="container">
        <small>© 2025 E-Learning FST — Master STR</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
