<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Résultat Quiz</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-rose">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i> E-Learning FST
        </a>
        <a href="/apprenant/dashboard" class="btn btn-navbar">
            <i class="bi bi-house"></i> Mes cours
        </a>
    </div>
</nav>

<div class="container mt-5 mb-5" style="max-width:600px;">
    <div class="card text-center"
         style="border:none; border-radius:25px;
                box-shadow:0 4px 30px rgba(233,30,140,0.15);
                overflow:hidden;">

        <!-- Header résultat -->
        <div style="background:linear-gradient(135deg,#e91e8c,#c2185b);
                    padding:40px; color:white;">
            <i class="bi bi-trophy-fill" style="font-size:4rem;"></i>
            <h3 class="mt-3 fw-bold">Résultat du Quiz</h3>
            <p th:text="${quiz.titre}" class="mb-0 opacity-75"></p>
        </div>

        <div class="card-body p-5">

            <!-- Score -->
            <div style="font-size:4rem; font-weight:700; color:#e91e8c;"
                 th:text="${resultat.score} + '/' + ${resultat.totalQuestions}">
            </div>

            <p class="text-muted mt-2 mb-4">
                Score obtenu
            </p>

            <!-- Barre de score -->
            <div class="progress mb-4"
                 style="height:15px; border-radius:10px;">
                <div class="progress-bar"
                     style="background:linear-gradient(135deg,#e91e8c,#c2185b);
                            border-radius:10px;"
                     th:style="'width:' + ${resultat.score * 100 / resultat.totalQuestions} + '%'">
                </div>
            </div>

            <!-- Message selon score -->
            <div th:if="${resultat.score == resultat.totalQuestions}"
                 class="alert alert-success">
                🎉 Parfait ! Toutes les réponses sont correctes !
            </div>
            <div th:if="${resultat.score >= resultat.totalQuestions / 2
                         and resultat.score < resultat.totalQuestions}"
                 class="alert alert-warning">
                👍 Bon travail ! Tu peux encore t'améliorer.
            </div>
            <div th:if="${resultat.score < resultat.totalQuestions / 2}"
                 class="alert alert-danger">
                💪 Continue à réviser, tu vas y arriver !
            </div>

            <!-- Boutons -->
            <div class="d-flex gap-3 justify-content-center mt-4">
                <a href="/apprenant/dashboard"
                   class="btn btn-rose">
                    <i class="bi bi-house"></i> Mes cours
                </a>
                <a href="/catalogue"
                   class="btn btn-rose-outline">
                    <i class="bi bi-grid"></i> Catalogue
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="footer-rose">
    <div class="container">
        <small>© 2025 E-Learning FST — Master STR</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
