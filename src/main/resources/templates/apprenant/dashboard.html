<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Espace Apprenant</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-rose">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i>
            E-Learning FST
        </a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white">
                <i class="bi bi-person-circle"></i>
                <span th:text="${apprenant.prenom + ' ' + apprenant.nom}"></span>
            </span>
            <a href="/catalogue" class="btn btn-navbar">
                <i class="bi bi-grid"></i> Catalogue
            </a>
            <form action="/logout" method="post" class="d-inline">
                <button class="btn btn-navbar" type="submit">
                    <i class="bi bi-box-arrow-right"></i>
                    Déconnexion
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">

    <!-- Header -->
    <div class="mb-4">
        <h2 class="section-title">
            <i class="bi bi-book"></i> Mes cours
        </h2>
        <p class="text-muted mt-3">
            Continuez votre apprentissage !
        </p>
    </div>

    <!-- Pas de cours -->
    <div th:if="${inscriptions.empty}" class="text-center py-5">
        <i class="bi bi-book" style="font-size:4rem; color:#f48fb1;"></i>
        <h4 class="mt-3 text-muted">
            Vous n'êtes inscrit à aucun cours
        </h4>
        <p class="text-muted">
            Découvrez nos cours dans le catalogue !
        </p>
        <a href="/catalogue" class="btn btn-rose mt-2">
            <i class="bi bi-grid"></i> Voir le catalogue
        </a>
    </div>

    <!-- Liste des cours -->
    <div class="row row-cols-1 row-cols-md-2 g-4"
         th:if="${!inscriptions.empty}">
        <div class="col" th:each="inscription : ${inscriptions}">
            <div class="card card-cours h-100">
                <div class="row g-0">
                    <div class="col-4">
                        <img th:src="${inscription.cours.imageUrl != null ?
                                      inscription.cours.imageUrl :
                                      '/images/default-cours.jpg'}"
                             class="img-fluid rounded-start h-100"
                             style="object-fit:cover;" alt=""/>
                    </div>
                    <div class="col-8">
                        <div class="card-body">

                            <!-- ✅ Statut corrigé sans lambda -->
                            <span class="badge me-1 bg-warning text-dark"
                                  th:if="${inscription.statut.name() == 'EN_COURS'}"
                                  th:text="${inscription.statut}">
                            </span>
                            <span class="badge me-1 bg-success"
                                  th:if="${inscription.statut.name() == 'TERMINE'}"
                                  th:text="${inscription.statut}">
                            </span>
                            <span class="badge me-1 bg-danger"
                                  th:if="${inscription.statut.name() == 'ABANDONNE'}"
                                  th:text="${inscription.statut}">
                            </span>

                            <h5 class="card-title mt-2"
                                th:text="${inscription.cours.titre}">
                            </h5>

                            <!-- Barre de progression -->
                            <div class="mb-2">
                                <div class="d-flex justify-content-between">
                                    <small class="text-muted">Progression</small>
                                    <small style="color:#e91e8c; font-weight:600;">
                                        <span th:text="${progressions[inscription.cours.id]}"></span>%
                                    </small>
                                </div>
                                <div class="progress"
                                     style="height:8px; border-radius:10px;">
                                    <div class="progress-bar"
                                         style="background:linear-gradient(
                                                135deg, #e91e8c, #c2185b);
                                                border-radius:10px;"
                                         th:style="'width:' +
                                         ${progressions[inscription.cours.id]} + '%'">
                                    </div>
                                </div>
                            </div>

                            <a th:href="@{/apprenant/cours/{id}(id=${inscription.cours.id})}"
                               class="btn btn-rose btn-sm w-100 mt-2">
                                <i class="bi bi-play-circle"></i>
                                Continuer
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer-rose">
    <div class="container">
        <small>© 2025 E-Learning FST — Master STR</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
