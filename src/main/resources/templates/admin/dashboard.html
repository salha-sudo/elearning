<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard Admin</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>

    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-rose">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i>
            E-Learning FST — Admin
        </a>

        <form action="/logout" method="post" class="d-inline">
            <button class="btn btn-navbar" type="submit">
                <i class="bi bi-box-arrow-right"></i>
                Déconnexion
            </button>
        </form>
    </div>
</nav>

<div class="container mt-4 mb-5">

    <h2 class="section-title mb-4">
        <i class="bi bi-speedometer2"></i>
        Tableau de bord Admin
    </h2>

    <!-- Stats -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalUtilisateurs}"></div>
                <p class="text-muted">
                    <i class="bi bi-people"></i> Utilisateurs
                </p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalCours}"></div>
                <p class="text-muted">
                    <i class="bi bi-book"></i> Cours actifs
                </p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalInscriptions}"></div>
                <p class="text-muted">
                    <i class="bi bi-person-check"></i> Inscriptions
                </p>
            </div>
        </div>
    </div>

    <!-- Utilisateurs -->
    <div class="card mb-4" style="border:none; border-radius:15px; box-shadow:0 4px 20px rgba(233,30,140,0.1);">

        <div class="card-header" style="background:linear-gradient(135deg, #fce4ec, #fdf6f9); border-radius:15px 15px 0 0; padding:20px;">
            <h5 style="color:#c2185b;" class="mb-0">
                <i class="bi bi-people"></i> Tous les utilisateurs
            </h5>
        </div>

        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead style="background:#fdf6f9;">
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Rôle</th>
                        <th>Statut</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="u : ${tousLesUtilisateurs}">
                        <td th:text="${u.prenom + ' ' + u.nom}"></td>
                        <td th:text="${u.email}"></td>

                        <!-- ROLE FIX -->
                        <td>
                            <span class="badge"
                                  th:classappend="
                                    ${u.role.name() == 'ADMIN'} ? 'bg-danger' :
                                    (${u.role.name() == 'FORMATEUR'} ? 'bg-primary' : 'bg-success')"
                                  th:text="${u.role}">
                            </span>
                        </td>

                        <!-- STATUT FIX -->
                        <td>
                            <span class="badge"
                                  th:classappend="${u.actif} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${u.actif ? 'Actif' : 'Inactif'}">
                            </span>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>
        </div>
    </div>

    <!-- Cours -->
    <div class="card" style="border:none; border-radius:15px; box-shadow:0 4px 20px rgba(233,30,140,0.1);">

        <div class="card-header" style="background:linear-gradient(135deg, #fce4ec, #fdf6f9); border-radius:15px 15px 0 0; padding:20px;">
            <h5 style="color:#c2185b;" class="mb-0">
                <i class="bi bi-book"></i> Tous les cours
            </h5>
        </div>

        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead style="background:#fdf6f9;">
                    <tr>
                        <th>Titre</th>
                        <th>Formateur</th>
                        <th>Niveau</th>
                        <th>Catégorie</th>
                        <th>Statut</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="c : ${tousLesCours}">
                        <td th:text="${c.titre}"></td>

                        <td th:text="${c.formateur.prenom + ' ' + c.formateur.nom}"></td>

                        <!-- Niveau OK -->
                        <td>
                            <span class="badge"
                                  th:classappend="'bg-info'"
                                  th:text="${c.niveau}">
                            </span>
                        </td>

                        <td th:text="${c.categorie}"></td>

                        <!-- STATUT FIX -->
                        <td>
                            <span class="badge"
                                  th:classappend="${c.actif} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${c.actif ? 'Actif' : 'Inactif'}">
                            </span>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>
        </div>
    </div>

</div>

<footer class="footer-rose">
    <div class="container">
        <small>© 2025 E-Learning FST — Master STR</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
