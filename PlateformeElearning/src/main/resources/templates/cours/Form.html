<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Nouveau Cours</title></head>
<body>
<h2>Créer un Cours</h2>
<form th:action="@{/cours/save}" th:object="${cours}" method="post">
  <label>Titre : <input type="text" th:field="*{titre}"/></label><br>
  <label>Description : <textarea th:field="*{description}"></textarea></label><br>
  <label>Catégorie : <input type="text" th:field="*{categorie}"/></label><br>
  <label>Niveau :
    <select th:field="*{niveau}">
      <option value="DEBUTANT">Débutant</option>
      <option value="INTERMEDIAIRE">Intermédiaire</option>
      <option value="AVANCE">Avancé</option>
    </select>
  </label><br>
  <button type="submit">Sauvegarder</button>
</form>
</body>
</html>
