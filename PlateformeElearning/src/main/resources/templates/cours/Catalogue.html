<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Catalogue des cours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2> Catalogue des cours</h2>

<!-- 🔍 Recherche -->
<form method="get" th:action="@{/web/cours}">
    <input type="text" name="keyword" class="form-control mb-3" placeholder="Rechercher...">
</form>

<!-- 📦 Liste -->
<div class="row">
    <div class="col-md-4" th:each="c : ${cours}">
        <div class="card p-2 mb-3">
            <h5 th:text="${c.titre}"></h5>
            <p th:text="${c.description}"></p>
            <span class="badge bg-primary" th:text="${c.niveau}"></span>

            <!-- 🔗 voir modules -->
            <a th:href="@{'/web/modules/cours/' + ${c.id}}" class="btn btn-sm btn-info mt-2">
                Voir modules
            </a>
        </div>
    </div>
</div>

</body>
</html>
